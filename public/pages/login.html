<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExamForge — Login</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>

<body>
  <header>
    <div class="container nav">
      <div class="brand" style="cursor:pointer;" id="brandLogo">
        <div class="brand-mark">E</div>
        <div>
          <div>ExamForge Arena</div>
          <div style="font-size:12px;color:var(--muted);letter-spacing:0;font-weight:800;">multiplayer study challenges</div>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <div style="max-width:480px;margin:0 auto;padding-top:40px;">
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">Welcome to ExamForge</h2>
          <p class="card-description">Sign in to create and track your study arenas.</p>
        </div>

        <div class="auth-tabs">
          <button class="auth-tab auth-tab-active" id="authTabLogin">Login</button>
          <button class="auth-tab" id="authTabRegister">Register</button>
        </div>

        <!-- Login form -->
        <div id="loginForm" class="mt-6">
          <div class="form-group">
            <label class="form-label required" for="loginEmail">Email Address</label>
            <input id="loginEmail" class="input" type="email" placeholder="you@example.com" autocomplete="email" />
          </div>

          <div class="form-group">
            <label class="form-label required" for="loginPassword">Password</label>
            <input id="loginPassword" class="input" type="password" placeholder="Enter your password" autocomplete="current-password" />
          </div>

          <button id="loginBtn" class="btn w-full">Login</button>
          
          <div id="loginError" style="display:none;"></div>
        </div>

        <!-- Register form -->
        <div id="registerForm" class="hidden mt-6">
          <div class="form-group">
            <label class="form-label required" for="registerUsername">Username</label>
            <input id="registerUsername" class="input" type="text" placeholder="Choose a unique username" autocomplete="username" />
            <span class="form-hint">This will be visible to other players</span>
          </div>

          <div class="form-group">
            <label class="form-label required" for="registerEmail">Email Address</label>
            <input id="registerEmail" class="input" type="email" placeholder="you@example.com" autocomplete="email" />
          </div>

          <div class="form-group">
            <label class="form-label required" for="registerPassword">Password</label>
            <input id="registerPassword" class="input" type="password" placeholder="At least 6 characters" autocomplete="new-password" />
            <span class="form-hint">Minimum 6 characters</span>
          </div>

          <button id="registerBtn" class="btn w-full">Create Account</button>
          
          <div id="registerError" style="display:none;"></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-row">
      <strong>Pentadee</strong>
      <span>ExamForge Arena · AI Study Challenges</span>
    </div>
  </footer>

  <script type="module" src="/js/pages/login.js"></script>
</body>
</html>
