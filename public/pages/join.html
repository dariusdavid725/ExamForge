<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExamForge — Join Arena</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>

<body>
  <header>
    <div class="container nav">
      <div class="brand" id="brandLogo" style="cursor:pointer;">
        <div class="brand-mark">E</div>
        <div>
          <div>ExamForge Arena</div>
          <div style="font-size:12px;color:var(--muted);letter-spacing:0;font-weight:800;">multiplayer study challenges</div>
        </div>
      </div>

      <div style="display:flex;align-items:center;gap:14px;">
        <span id="headerStreak" style="display:none;font-weight:900;font-size:16px;"></span>
        <div id="headerUserArea" style="display:none;align-items:center;gap:8px;cursor:pointer;"></div>
      </div>
    </div>
  </header>

  <main class="container" style="max-width:480px;padding-top:40px;">

    <div style="display:flex;align-items:center;gap:16px;margin-bottom:32px;">
      <a href="/" class="btn btn-secondary" style="padding:10px 16px;">← Back</a>
      <h2 style="margin:0;">Join Arena</h2>
    </div>

    <div class="card">
      <div class="eyebrow">Player</div>
      <p class="muted" style="margin-top:8px;">Enter the room code shared by your host to jump in.</p>

      <div style="margin-top:28px;">
        <label class="eyebrow">Room code</label>
        <input id="joinCodeInput" class="input" style="margin-top:12px;text-transform:uppercase;letter-spacing:4px;font-size:22px;text-align:center;" placeholder="ABCDE" maxlength="5" />
      </div>

      <div style="margin-top:18px;">
        <label class="eyebrow">Your nickname</label>
        <input id="joinNameInput" class="input" style="margin-top:12px;" placeholder="e.g. Alex" />
      </div>

      <button id="joinArenaBtn" class="btn" style="width:100%;margin-top:24px;padding:16px;">Join room</button>
      <p id="joinStatusText" class="status"></p>
    </div>

  </main>

  <footer class="site-footer">
    <div class="container footer-row">
      <strong>Pentadee</strong>
      <span>ExamForge Arena · AI Study Challenges</span>
    </div>
  </footer>

  <script type="module" src="/js/pages/join.js"></script>
</body>
</html>
